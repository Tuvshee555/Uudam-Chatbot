name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GEMINI_API_KEY: ci-gemini-key
      VERIFY_TOKEN: ci-verify-token
      TOKEN_PAGE: ci-page-token
      FACEBOOK_PAGE_ID: "1234567890"
      META_APP_SECRET: ci-meta-secret
      ADMIN_SECRET: ci-admin-secret
      TRUST_PROXY_HEADERS: "true"
      ALLOW_ADMIN_SECRET_QUERY: "false"
      REDIS_STATE_ENABLED: "false"
      REDIS_RATE_LIMIT_ENABLED: "false"
      REDIS_REPLAY_ENABLED: "false"
      REDIS_CONVERSATION_ENABLED: "false"
      REDIS_PAUSE_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Chaos Validation
        run: npm run chaos

      - name: Preflight
        run: npm run preflight

      - name: Preflight (strict, simulated production)
        env:
          NODE_ENV: production
          STRICT_PREFLIGHT: "true"
        run: npm run preflight

      - name: Remind about golden-question QA
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "${{ github.event.pull_request.base.sha }}" 2>/dev/null || true
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- \
              src/lib/travelFastPaths.ts src/lib/travelAI.ts src/lib/reply.ts \
              src/pages/api/demo.ts src/pages/api/webhook.ts | grep -q .; then
            echo "::warning::Bot-answer logic changed in this PR. golden-questions.mjs needs GEMINI_API_KEY + a live DB and can't run in CI — run 'npm run dev' + 'npm run qa:golden' locally against real trip data before deploying."
          fi

